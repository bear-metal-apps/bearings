[changelog]
header = """
# Changelog

"""

body = """
{% if version %}## {{ version }}
**Released:** {{ timestamp | date(format="%Y-%m-%d") }}

{% else %}## Unreleased

{% endif %}{% for group, commits in commits | group_by(attribute="group") %}### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}- {% if commit.scope %}{{ commit.scope }}: {% endif %}{{ commit.message | upper_first | trim }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}

{% endfor %}
"""

trim = true

[git]
conventional_commits = true
filter_commits = true
split_commits = false
sort_commits = "oldest"

commit_preprocessors = [
  { pattern = '\\((\\w+\\s)?#([0-9]+)\\)', replace = "" },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs?", group = "Documentation" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^test", group = "Tests" },
  { body = ".*BREAKING CHANGE:.*", group = "Breaking Changes" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chores" },
]

protect_breaking_commits = false
filter_unconventional = false